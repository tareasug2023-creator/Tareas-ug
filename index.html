<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Préstamos Semanal - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        .pago-0 { border: 2px solid #cbd5e1; color: #cbd5e1; } /* Pendiente */
        .pago-1 { background-color: #22c55e; color: white; border-color: #22c55e; } /* Cobrado */
        .pago-2 { background-color: #ef4444; color: white; border-color: #ef4444; } /* Atrasado */
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-indigo-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter uppercase"><i class="fas fa-hand-holding-dollar"></i> Cobro Semanal</h1>
            <div class="text-[10px] bg-indigo-900 px-3 py-1 rounded-full border border-indigo-400">CLOUD SYNC ACTIVE</div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 italic text-sm">NUEVO PRÉSTAMO</h2>
                    <form id="loanForm" class="space-y-3">
                        <input type="text" id="cliente" placeholder="Nombre del Cliente" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="monto" step="0.01" placeholder="Monto $" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                            <input type="number" id="interes" step="0.1" placeholder="Interés %" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="cuotas" placeholder="Semanas" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                            <input type="date" id="fecha" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                            REGISTRAR CRÉDITO
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                                <tr>
                                    <th class="px-6 py-4">Cliente / Total</th>
                                    <th class="px-6 py-4">Control de Semanas</th>
                                    <th class="px-6 py-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="loanTableBody" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            databaseURL: "https://controlprestamo-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const loanForm = document.getElementById('loanForm');
        const loanTableBody = document.getElementById('loanTableBody');

        // 1. GUARDAR PRÉSTAMO
        loanForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const numCuotas = parseInt(document.getElementById('cuotas').value);
            
            // Creamos un array de pagos vacío (0 = pendiente)
            const pagosIniciales = Array(numCuotas).fill(0);

            const data = {
                cliente: document.getElementById('cliente').value,
                monto: parseFloat(document.getElementById('monto').value),
                interes: parseFloat(document.getElementById('interes').value),
                cuotas: numCuotas,
                fecha_inicio: document.getElementById('fecha').value,
                pagos: pagosIniciales
            };

            db.ref('prestamos').push(data).then(() => {
                loanForm.reset();
            });
        });

        // 2. LEER Y MOSTRAR DATOS
        db.ref('prestamos').on('value', (snap) => {
            loanTableBody.innerHTML = '';
            const items = snap.val();

            if(items) {
                for(let id in items) {
                    const p = items[id];
                    const total = p.monto + (p.monto * (p.interes / 100));
                    
                    // Generar círculos de semanas
                    let circulosHTML = '';
                    p.pagos.forEach((estado, index) => {
                        // Calcular fecha de esa semana
                        const f = new Date(p.fecha_inicio);
                        f.setDate(f.getDate() + (index * 7) + 7);
                        const fechaSemana = f.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

                        let icono = '';
                        if(estado === 1) icono = '<i class="fas fa-check text-[10px]"></i>';
                        if(estado === 2) icono = '<i class="fas fa-times text-[10px]"></i>';

                        circulosHTML += `
                            <div class="flex flex-col items-center gap-1">
                                <span class="text-[8px] font-bold text-gray-400 uppercase">${fechaSemana}</span>
                                <button onclick="cambiarPago('${id}', ${index}, ${estado})" 
                                    class="w-8 h-8 rounded-full flex items-center justify-center transition-all shadow-sm pago-${estado}">
                                    ${icono}
                                </button>
                                <span class="text-[8px] text-gray-300">S${index + 1}</span>
                            </div>
                        `;
                    });

                    loanTableBody.innerHTML += `
                        <tr class="hover:bg-indigo-50/20 transition">
                            <td class="px-6 py-6">
                                <div class="font-black text-gray-800 uppercase text-sm">${p.cliente}</div>
                                <div class="text-indigo-600 font-bold text-xs">$${total.toFixed(2)}</div>
                                <div class="text-[9px] text-gray-400 uppercase">Inicio: ${p.fecha_inicio}</div>
                            </td>
                            <td class="px-6 py-6">
                                <div class="flex flex-wrap gap-3">
                                    ${circulosHTML}
                                </div>
                            </td>
                            <td class="px-6 py-6 text-center">
                                <button onclick="borrar('${id}')" class="text-gray-300 hover:text-red-500 transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }
            } else {
                loanTableBody.innerHTML = '<tr><td colspan="3" class="p-20 text-center text-gray-400 italic">No hay registros en la nube.</td></tr>';
            }
        });

        // 3. LOGICA DE CAMBIO DE ESTADO (CÍRCULOS)
        function cambiarPago(loanId, index, estadoActual) {
            // Ciclo: 0 (Gris) -> 1 (Verde) -> 2 (Rojo) -> 0 (Gris)
            let nuevoEstado = 0;
            if(estadoActual === 0) nuevoEstado = 1;
            else if(estadoActual === 1) nuevoEstado = 2;
            else nuevoEstado = 0;

            db.ref(`prestamos/${loanId}/pagos/${index}`).set(nuevoEstado);
        }

        // 4. BORRAR
        function borrar(id) {
            if(confirm('¿Eliminar este préstamo permanentemente?')) {
                db.ref('prestamos/' + id).remove();
            }
        }
    </script>
</body>
</html>
