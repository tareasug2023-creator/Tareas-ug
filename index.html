<Prestamos html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Préstamos - Fechas de Vencimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-slate-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black uppercase italic tracking-widest text-indigo-400">
                <i class="fas fa-calendar-check mr-2"></i> Cobros Semanal
            </h1>
            <div class="text-xs font-mono bg-slate-800 px-3 py-1 rounded border border-slate-700">
                DATABASE: ACTIVE
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-indigo-500"></i> Nuevo Préstamo
                    </h3>
                    <form id="loanForm" class="space-y-4">
                        <input type="text" id="cliente" placeholder="Nombre del Cliente" class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="monto" step="0.01" placeholder="Monto $" class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                            <input type="number" id="interes" step="0.1" placeholder="Interés %" class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400 ml-1">Fecha de Emisión</label>
                            <input type="date" id="fecha" class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                            GUARDAR REGISTRO
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest font-black">
                                <th class="px-6 py-4">Cliente / Estado</th>
                                <th class="px-6 py-4">Fechas (Inicio - Fin)</th>
                                <th class="px-6 py-4">Monto Final</th>
                                <th class="px-6 py-4 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="loanTableBody" class="divide-y divide-gray-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // REEMPLAZA CON TU URL
        const firebaseConfig = {
            databaseURL: "https://controlprestamo-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const loanForm = document.getElementById('loanForm');
        const loanTableBody = document.getElementById('loanTableBody');

        loanForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fechaInicio = new Date(document.getElementById('fecha').value);
            // Calculamos fecha de caducidad (30 días después por defecto)
            const fechaFin = new Date(fechaInicio);
            fechaFin.setDate(fechaFin.getDate() + 30);

            const data = {
                cliente: document.getElementById('cliente').value,
                monto: parseFloat(document.getElementById('monto').value),
                interes: parseFloat(document.getElementById('interes').value),
                fecha_inicio: document.getElementById('fecha').value,
                fecha_fin: fechaFin.toISOString().split('T')[0]
            };
            db.ref('prestamos').push(data).then(() => loanForm.reset());
        });

        db.ref('prestamos').on('value', (snap) => {
            loanTableBody.innerHTML = '';
            const items = snap.val();
            const hoy = new Date().toISOString().split('T')[0];

            if(items) {
                for(let id in items) {
                    const p = items[id];
                    const total = p.monto + (p.monto * (p.interes / 100));
                    const isVencido = hoy > p.fecha_fin;

                    loanTableBody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-5">
                                <div class="font-black text-slate-800 uppercase tracking-tight">${p.cliente}</div>
                                <span class="px-2 py-0.5 text-[9px] rounded-full font-bold ${isVencido ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                    ${isVencido ? 'VENCIDO / MORA' : 'VIGENTE'}
                                </span>
                            </td>
                            <td class="px-6 py-5">
                                <div class="flex flex-col">
                                    <span class="text-gray-400 text-[10px]"><i class="fas fa-arrow-right text-indigo-400"></i> ${p.fecha_inicio}</span>
                                    <span class="font-bold ${isVencido ? 'text-red-500' : 'text-slate-600'} text-[11px] uppercase tracking-tighter">
                                        <i class="fas fa-calendar-times"></i> ${p.fecha_fin}
                                    </span>
                                </div>
                            </td>
                            <td class="px-6 py-5 font-black text-indigo-600 text-base">$${total.toFixed(2)}</td>
                            <td class="px-6 py-5 text-center">
                                <button onclick="borrar('${id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }
            }
        });

        function borrar(id) {
            if(confirm('¿Eliminar este registro de forma permanente?')) db.ref('prestamos/'+id).remove();
        }
    </script>
</body>
</html>
